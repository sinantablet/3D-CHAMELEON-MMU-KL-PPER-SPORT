################################
# Yazdırılan son takım boşlatma
################################

[gcode_macro TOOL_OUT]
description: Baskı bittiğinde yolu kapatıp, takımı seçip sonra geri çeker
gcode:
  {% set current_tool = printer["gcode_macro TOOL_INIT"].tool %}
  {% set F = 6000 %}
  {% set current_z = printer.toolhead.position.z %}
  {% set Z_safe = [current_z + 10, printer.toolhead.axis_maximum.z]|min %}
  M117 "Baski bitti, Tahliye Basliyor..."
  G90
  G1 Z{Z_safe} F3000
  G1 X290 Y290 F{F}
  FILAMENT_CUT
  EXTRUDER_UNLOAD
  TOOL_SELECT TOOL={current_tool} 
  M400
  CHAMELEON_UNLOAD
  M117 "Bitti: Takim {current_tool} tamamen geri cekildi."


#####################################
# Açılışta mmu için extuder kontrolü
#####################################

[gcode_macro SAFE_RECOVERY_STARTUP]
  
description: mmu_check sensör durumuna göre elektrik sonrası extuder boşaltma 
gcode:
    # 1. mmu_check sensörünün anlık durumunu sorgula
    QUERY_FILAMENT_SENSOR SENSOR=mmu_check
    
    # 2. Sensör tetikliyse (Filament extruder girişinde veya ilerisindeyse)
    {% if printer["filament_switch_sensor mmu_check"].filament_detected %}
        M117 Kritik: mmu_check tetikli! Tahliye basliyor...
        
        # Extruder'ı güvenli sıcaklığa getir
        M109 S200 
        
        # Eksenleri Home yap (Kesme ve hareket için gerekli)
        {% if printer.toolhead.homed_axes != "xyz" %}
            G28
        {% endif %}
        
        # Yolu temizle
        FILAMENT_CUT
        EXTRUDER_UNLOAD
        
                # T0 Tahliye
        MANUAL_STEPPER stepper=selector MOVE=0
        M117 T0 geri cekiliyor...
        MANUAL_STEPPER stepper=chameleon MOVE=-115 speed=40
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0

        # T1 Tahliye
        MANUAL_STEPPER stepper=selector MOVE=-4.5
        M117 T1 geri cekiliyor...
        MANUAL_STEPPER stepper=chameleon MOVE=-115 speed=40
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0

        # T2 Tahliye
        MANUAL_STEPPER stepper=selector MOVE=-9.5
        M117 T2 geri cekiliyor...
        MANUAL_STEPPER stepper=chameleon MOVE=115 speed=40
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0

        # T3 Tahliye
        MANUAL_STEPPER stepper=selector MOVE=-12.5
        M117 T3 geri cekiliyor...
        MANUAL_STEPPER stepper=chameleon MOVE=115 speed=40
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0

        
    {% else %}
        # mmu_check temizse, doğrudan hizalamaya geç
        M117 Yollar acik, standart baslangic yapiliyor.
        SMART_INITIAL_LOAD
    {% endif %}