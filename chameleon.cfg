#############################
# Manual Stepper Tanımlamaları
#############################

[manual_stepper selector]
step_pin: nano:PE0
dir_pin: nano:PB9
microsteps: 1
rotation_distance: 2
enable_pin: !nano:PE1
endstop_pin: !nano:PA2  
velocity: 20      
accel: 20      
position_endstop: 15

[manual_stepper chameleon]
step_pin: nano:PB5
dir_pin: nano:PB4
microsteps: 16
rotation_distance: 41
enable_pin: !nano:PB8
endstop_pin: nano:PE6
position_endstop: 0


#############################
# takım seçici sıfırlama
#############################

[delayed_gcode startup_move]
initial_duration: 2
gcode:
    
    MANUAL_STEPPER STEPPER=selector MOVE=15
    MANUAL_STEPPER STEPPER=selector SET_POSITION=0
    SAFE_RECOVERY_STARTUP
    TS0
    MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
    


#############################
# Filament ekran durum bildirgesi
#############################


[gcode_macro FILAMENT_INSERTED]
description: "Resumes the print when filament is inserted"
gcode:
    M117 "Filament detected! Resuming print..."
    RESUME


#############################
# Filament Sensör Tanımlamaları
#############################

[filament_switch_sensor tool_0_sensor]
switch_pin: nano:PA15
pause_on_runout: True
runout_gcode:
    M117 "Filament Runout on Tool 0!"
insert_gcode:
    M117 "Filament inserted!"
    {% set state = printer.print_stats.state %}
    {% if state == "standby" %}
        M117 "Running smart load..."
        TS0
        CHAMELEON_EXTRUDER_SMART_LOAD
        TS0
    {% else %}
        M117 "Printing or paused, ignoring sensor trigger."
    {% endif %}



[filament_switch_sensor tool_1_sensor]
switch_pin: nano:PA12
pause_on_runout: True
runout_gcode:
    M117 "Filament Runout on Tool 1!"
insert_gcode:
    M117 "Filament inserted!"
    {% set state = printer.print_stats.state %}
    {% if state == "standby" %}
        M117 "Running smart load..."
        TS1
        CHAMELEON_EXTRUDER_SMART_LOAD
        TS0
    {% else %}
        M117 "Printing or paused, ignoring sensor trigger."
    {% endif %}




[filament_switch_sensor tool_2_sensor]
switch_pin: nano:PA11
pause_on_runout: True
runout_gcode:
    M117 "Filament Runout on Tool 2!"
insert_gcode:
    M117 "Filament inserted!"
    {% set state = printer.print_stats.state %}
    {% if state == "standby" %}
        M117 "Running smart load..."
        TS2
        CHAMELEON_EXTRUDER_SMART_LOAD
        TS0
    {% else %}
        M117 "Printing or paused, ignoring sensor trigger."
    {% endif %}



[filament_switch_sensor tool_3_sensor]
switch_pin: nano:PC4
pause_on_runout: True
runout_gcode:
    M117 "Filament Runout on Tool 3!"
insert_gcode:
    M117 "Filament inserted!"
    {% set state = printer.print_stats.state %}
    {% if state == "standby" %}
        M117 "Running smart load..."
        TS3
        CHAMELEON_EXTRUDER_SMART_LOAD
        TS0
    {% else %}
        M117 "Printing or paused, ignoring sensor trigger."
    {% endif %}





#############################
# MMU FİLAMNET CONTROL SYSTEM (MEKANİK KORUMALI SÜRÜM)
#############################

[filament_switch_sensor mmu_check]
switch_pin: nano:PB2
pause_on_runout: False

[gcode_macro MOVE_AND_CHECK]
description: Filamenti anında kontrol eder, yoksa kurtarma dener, yine olmazsa PAUSE yapar
variable_load_retry: 0
gcode:
  QUERY_FILAMENT_SENSOR SENSOR=mmu_check
  
  {% set target_tool = printer["gcode_macro TOOL_INIT"].tool | int %}
  {% set current_retry = printer["gcode_macro MOVE_AND_CHECK"].load_retry | int %}
  {% set retry_limit = 3 %} 
  {% set speed = printer["gcode_macro TOOL_INIT"].chameleon_speed %}

  # 1. DURUM: FİLAMAN ALGILANDI
  {% if printer["filament_switch_sensor mmu_check"].filament_detected %}
    M117 MMU icin Filament gecisi saglandi.
    SET_GCODE_VARIABLE MACRO=MOVE_AND_CHECK VARIABLE=load_retry VALUE=0

  # 2. DURUM: FİLAMAN YOK
  {% else %}
    {% if current_retry < retry_limit %}
      {action_respond_info("HATA: Filament algilanamadi! Güvenli Kurtarma Denemesi %d/%d" % (current_retry + 1, retry_limit))}
      SET_GCODE_VARIABLE MACRO=MOVE_AND_CHECK VARIABLE=load_retry VALUE={current_retry + 1}
      
      # --- KULEDE MEKANİK GÜVENLİ KURTARMA ---
      EXTRUDER_UNLOAD                             
      TOOL_SELECT TOOL={target_tool}              
      
      # Chameleon Mikro Geri Çekme (Filamenti dişliden kaçırmadan sadece 25mm gevşetir)
      MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
      {% if target_tool == 0 or target_tool == 1 %}
          MANUAL_STEPPER stepper=chameleon MOVE=-25 SPEED={speed}
          MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
          MANUAL_STEPPER stepper=chameleon MOVE=40 SPEED={speed} 
      {% else %}
          MANUAL_STEPPER stepper=chameleon MOVE=25 SPEED={speed}
          MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
          MANUAL_STEPPER stepper=chameleon MOVE=-40 SPEED={speed} 
      {% endif %}
      
      # Tekrar Kavrama ve Extruder'a Güvenli Teslimat
      G92 E0
      G1 E8 F300 
      TOOL_FREE TOOL={target_tool}                
      EXTRUDER_LOAD                               
      M400                                        
      
      UPDATE_DELAYED_GCODE ID=_RETRY_TRIGGER DURATION=0.1

    # 3. DURUM: 3 DENEME DE BAŞARISIZ OLDU -> KESİN PAUSE
    {% else %}
      {action_respond_info("HATA: 3 otomatik deneme basarisiz! Filament algilanamadi. Yazdirma Duraklatiliyor...")}
      SET_GCODE_VARIABLE MACRO=MOVE_AND_CHECK VARIABLE=load_retry VALUE=0
      
      {% if "xyz" in printer.toolhead.homed_axes %}
        PAUSE
      {% else %} 
        M117 HATA: MMU için Filament Yüklenemedi.
        PAUSE
      {% endif %} 
    {% endif %}
  {% endif %}

[delayed_gcode _RETRY_TRIGGER]
gcode:
  MOVE_AND_CHECK









  
#############################
# G-Code Makroları
#############################

[gcode_macro TOOL_INIT]
description: Homes the tool selector. Needed before any tool change.
variable_tool: 0
variable_ysplit_distance: 100
variable_chameleon_speed: 40
variable_chameleon_acc: 40
gcode:
  MANUAL_STEPPER STEPPER=selector SET_POSITION=0 
  MANUAL_STEPPER STEPPER=selector MOVE=-1.40
  MANUAL_STEPPER STEPPER=selector SET_POSITION=0 
  MANUAL_STEPPER STEPPER=selector MOVE=0.12
  MANUAL_STEPPER STEPPER=selector SET_POSITION=0 
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0




  {% if printer["gcode_macro TOOL_INIT"].tool == 0 %}
    M117 "Mevcut takım korunuyor"
  {% else %}
    M117 "Aktif takım: {printer["gcode_macro TOOL_INIT"].tool}"
  {% endif %}


  
#############################
# filamnet gps
#############################

[gcode_macro SMART_INITIAL_LOAD]
gcode:
    M117 Filamentler Hizalanıyor...
    TS0
    CHAMELEON_UNLOAD 
    CHAMELEON_EXTRUDER_SMART_LOAD 
    TS1
    CHAMELEON_UNLOAD
    CHAMELEON_EXTRUDER_SMART_LOAD
    TS2
    CHAMELEON_UNLOAD
    CHAMELEON_EXTRUDER_SMART_LOAD
    TS3
    CHAMELEON_UNLOAD
    CHAMELEON_EXTRUDER_SMART_LOAD
    M117 Tüm Filamentler Hazır ve Park Edildi!



#############################
# nuuzel temizleme konumu
#############################



[gcode_macro WIPE]
description: Nozzle temizleme
gcode:
  {% set F = params.F|default(6000)|int %}
  {% set current_z = printer.toolhead.position.z %}
  {% set max_model_z = params.model_z|default(current_z)|float %}
  {% set Z_safe = [current_z + 5, max_model_z + 5]|max %}
  G90 
  G1 Z{Z_safe} F3000
  G1 X290 Y290 F{F}
  {% for _ in range(3) %}  ; 3 kez tekrarla
  {% endfor %}
  G92 E0
 




#############################
# filamet kesme konumu 
#############################


[gcode_macro FILAMENT_CUT]
description: Filament kesme, tamamen otomatik güvenli Z
gcode:
  {% set F = params.F|default(6000)|int %}
  {% set current_z = printer.toolhead.position.z %}
  {% set max_model_z = params.model_z|default(current_z)|float %}
  {% set Z_safe = [current_z + 5, max_model_z + 5]|max %}

  
  G90 
  G1 Z{Z_safe} F3000
  G1 X290 Y290 F{F}

  G92 E0
  G1 E-2 F300
  G92 E0
  G1 E-90 F2500
  G92 E0; 
  G1 X300 Y290 F4000  
  G1 X250 Y299 F4000
  G1 X300 Y299 F4000
  G1 X290 Y290 F4000
  M117 "Filament kesildi"
  G92 E0  





#############################
# takım seçici konum paremetresi
#############################

[gcode_macro TS0]
gcode:
  TOOL_SELECT TOOL=0

[gcode_macro TS1]
gcode:
  TOOL_SELECT TOOL=1

[gcode_macro TS2]
gcode:
  TOOL_SELECT TOOL=2

[gcode_macro TS3]
gcode:
  TOOL_SELECT TOOL=3


#############################
# takkım seçici
#############################


[gcode_macro TOOL_SELECT]
gcode:
  {% set TOOL = params.TOOL|int %}
  {% set SELECTOR_SPEED = 20 %}
  M117 "Setting tool to TOOL{TOOL}"
  
 
  {% if TOOL == 0 %}
    MANUAL_STEPPER stepper=selector MOVE=0
  {% elif TOOL == 1 %}
    MANUAL_STEPPER stepper=selector MOVE=-4.5
  {% elif TOOL == 2 %}
    MANUAL_STEPPER stepper=selector MOVE=-9.5
  {% elif TOOL == 3 %}
    MANUAL_STEPPER stepper=selector MOVE=-12.5
  {% endif %}
  SET_GCODE_VARIABLE MACRO=TOOL_INIT VARIABLE=tool VALUE={TOOL}

#############################
# takımları boşa alma
#############################




[gcode_macro TOOL_FREE]
gcode:
  {% set TOOL = params.TOOL|int %}
   M117 "Free filament path for tool {TOOL}"
  {% if TOOL == 0 %}
    MANUAL_STEPPER stepper=selector MOVE=-12.5
  {% elif TOOL == 1 %}
    MANUAL_STEPPER stepper=selector MOVE=-9.5
  {% elif TOOL == 2 %}
    MANUAL_STEPPER stepper=selector MOVE=0
  {% elif TOOL == 3 %}
    MANUAL_STEPPER stepper=selector MOVE=-4.5
  {% endif %}

#############################
# chamelon boşaltma
#############################

[gcode_macro CHAMELEON_UNLOAD]
description: Unloads the filament from the tubing
gcode:
  {% set TOOL=printer["gcode_macro TOOL_INIT"].tool %}
  {% set YSPLIT_DIST=printer["gcode_macro TOOL_INIT"].ysplit_distance %}
  {% set SPEED=printer["gcode_macro TOOL_INIT"].chameleon_speed %}
  {% set ACC=printer["gcode_macro TOOL_INIT"].chameleon_acc %}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  {% if TOOL == 0 or TOOL == 1 %}
  
  MANUAL_STEPPER stepper=chameleon MOVE=-{YSPLIT_DIST} SPEED={SPEED} ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0

  {% else %}
 
  MANUAL_STEPPER stepper=chameleon MOVE={YSPLIT_DIST} SPEED={SPEED} ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  
  {% endif %}

#############################
# cahmelon yükleme
#############################

[gcode_macro CHAMELEON_LOAD]
description: Loads the filament into the extruder bowden
gcode:
  {% set TOOL=printer["gcode_macro TOOL_INIT"].tool %}
  {% set YSPLIT_DIST=printer["gcode_macro TOOL_INIT"].ysplit_distance %}
  {% set SPEED=printer["gcode_macro TOOL_INIT"].chameleon_speed %}
  {% set ACC=printer["gcode_macro TOOL_INIT"].chameleon_acc %}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  {% if TOOL == 0 or TOOL == 1 %}
  
  MANUAL_STEPPER stepper=chameleon MOVE={5} SPEED=20 ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  MANUAL_STEPPER stepper=chameleon MOVE={YSPLIT_DIST} SPEED={SPEED} ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  MANUAL_STEPPER stepper=chameleon MOVE={15} SPEED=20 ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  {% else %}

  MANUAL_STEPPER stepper=chameleon MOVE=-{5} SPEED=20 ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  MANUAL_STEPPER stepper=chameleon MOVE=-{YSPLIT_DIST} SPEED={SPEED} ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  MANUAL_STEPPER stepper=chameleon MOVE=-{15} SPEED=20 ACCEL={ACC}
  MANUAL_STEPPER STEPPER=chameleon SET_POSITION=0
  {% endif %}
  G92 E0




#############################
# cahmelon filamneti otomatik extruder başlangıç konumuna yükleme
#############################


[gcode_macro CHAMELEON_EXTRUDER_SMART_LOAD]
description: "Filamenti switche kadar yukler, tetiklenince 100 mm geri ceker"
gcode:
    {% set TOOL = printer["gcode_macro TOOL_INIT"].tool|int %}
    {% set SPEED = printer["gcode_macro TOOL_INIT"].chameleon_speed|float %}
    {% set ACC = printer["gcode_macro TOOL_INIT"].chameleon_acc|int %}

    MANUAL_STEPPER stepper=chameleon SET_POSITION=0

    {% if TOOL == 0 or TOOL == 1 %} 
        MANUAL_STEPPER stepper=chameleon MOVE=1000 speed={SPEED} accel={ACC} stop_on_endstop=1
    {% else %} 
        MANUAL_STEPPER stepper=chameleon MOVE=-1000 speed={SPEED} accel={ACC} stop_on_endstop=1
    {% endif %}

    MANUAL_STEPPER stepper=chameleon SET_POSITION=0

    {% if TOOL == 0 or TOOL == 1 %}
        MANUAL_STEPPER stepper=chameleon MOVE=-95 speed={SPEED} accel={ACC}
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0
    {% else %}
        MANUAL_STEPPER stepper=chameleon MOVE=95 speed={SPEED} accel={ACC}
        MANUAL_STEPPER stepper=chameleon SET_POSITION=0
    {% endif %}
    
    G92 E0
    M117 "Smart load tamamlandi (100 mm geri cekildi)"



#############################
# EXTRUDER boşaltma 
#############################
[gcode_macro EXTRUDER_UNLOAD]
description: 
gcode:
    
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("HATA: Extruder sicakligi cok dusuk (180C altinda)! Bosaltma iptal edildi.")}
        M117 HATA: Sicaklik Dusuk!
        
    {% else %}
        
        G92 E0
        G1 E-42 F2000
        G92 E0
       
    {% endif %}



#############################
# EXTRUDER yükleme 
#############################
[gcode_macro EXTRUDER_LOAD]
description: 
gcode:
    
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("HATA: Extruder sicakligi cok dusuk (180C altinda)! Yukleme iptal edildi.")}
        M117 HATA: Sicaklik Dusuk!
        
    {% else %}
        
        G92 E0
        G1 E108 F2000
        G92 E0
        G1 E1 F200
        G92 E0
       
    {% endif %}





#############################
# takım hareketleri T0 T1 T2 T3
#############################


[gcode_macro T0]
description: Changes the filament to tool 0
gcode:
  {% set TOOL = 0 %}
  {% set F = params.F|default(6000)|int %}
  {% set current_z = printer.toolhead.position.z %}
  {% set max_model_z = params.model_z|default(current_z)|float %}
  {% set Z_safe = [current_z + 3, max_model_z + 3]|max %}

  G90 
  G1 Z{Z_safe} F3000     
  G1 X290 Y290 F{F}        
  G1 Z{current_z} F3000   

  FILAMENT_CUT
  EXTRUDER_UNLOAD

  {% if printer["gcode_macro TOOL_INIT"].tool != TOOL %}
    TOOL_SELECT TOOL={printer["gcode_macro TOOL_INIT"].tool}
    CHAMELEON_UNLOAD
  {% endif %}

  SET_GCODE_VARIABLE MACRO=TOOL_INIT VARIABLE=tool VALUE={TOOL}
  TOOL_SELECT TOOL={TOOL}
  CHAMELEON_LOAD
  G1 E8 F300
  TOOL_FREE TOOL={TOOL}
  
  G1 Z{Z_safe} F3000     
  EXTRUDER_LOAD
  M400
  MOVE_AND_CHECK
  G1 Z{current_z} F3000   
  WIPE
  G92 E0

