  CHAMELEON_LOAD
  G1 E8 F300
  TOOL_FREE TOOL={TOOL}
  
  G1 Z{Z_safe} F3000
  EXTRUDER_LOAD
  M400
  MOVE_AND_CHECK
  G1 Z{current_z} F3000
  WIPE
  G92 E0

